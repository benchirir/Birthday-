<!DOCTYPE html><html lang="en">
<head>

  <meta charset="UTF-8" />

  <title>Happy Birthday Benchiri</title>
  <style>
    * {

      padding: 0;
      box-sizing: border-box;

    }body {
  min-height: 100vh;

  padding: 20px;
}

  width: 100%;

}

h1 {
  font-family: 'Cinzel', serif;
  font-size: 3.4rem;
  margin-bottom: 16px;
}

h2 {
  font-size: 1.8rem;
  color: #c0c0c0;
  margin-bottom: 20px;
}

p {
  font-size: 1.1rem;
  line-height: 1.7;
  margin-bottom: 16px;
}

.emoji {
  font-size: 2rem;
  margin-bottom: 20px;
}

.footer {
  margin-top: 24px;
  font-size: 1rem;
  opacity: 0.9;
}

.name {
  font-weight: bold;
  color: #c0c0c0;
}

  </style>
</head>
<body>
  <div class="card"><h1>Happy Birthday Benchiri</h1>


<p>
  Thank you for taking a moment to celebrate with me.
</p>

<p>

</p>

<p>
  Wishes — Ben Chiri
</p>

<div class="footer">

  <span class="name">Benchiri</span>
</div>

  </div>
</body>
</html>
